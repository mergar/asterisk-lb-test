# --- Глобальные параметры ---
log_stderror=no
#syslog_facility=LOG_LOCAL0

# Укажите реальный IP вашего Kamailio вместо 172.16.0.100
listen=udp:172.16.0.149:5060

# --- Загрузка модулей ---
mpath="/usr/local/lib/kamailio/modules/"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "maxfwd.so"
loadmodule "pv.so"
loadmodule "textops.so"
loadmodule "xlog.so"
loadmodule "textopsx.so"
loadmodule "dispatcher.so"
loadmodule "rr.so"
loadmodule "siputils.so"

# --- Настройка модуля Dispatcher (Балансировщик) ---
modparam("dispatcher", "list_file", "/usr/local/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2) # Флаги по умолчанию
modparam("dispatcher", "ds_ping_interval", 10) # Проверка каждые 10 секунд
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=404;code=488") # Какие ответы считать успехом
modparam("dispatcher", "ds_probing_mode", 1) # Проверять все ноды
# Настройка кастомного хедера для пинга:
modparam("dispatcher", "ds_ping_from", "sip:checker@kamailio.local")
#modparam("dispatcher", "ds_ping_extra_headers", "X-Health-Check: Kamailio-Active\r\n")

# --- Логика маршрутизации ---
route {
    # Защита от петель
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Отсекаем ответы (они идут по VIA автоматически)
    if (is_method("REPLY")) {
        exit;
    }

    # Обработка внутридиалоговых запросов (ACK, BYE и т.д.)
    if (has_totag()) {
        # Маршрутизация на основе loose routing (Record-Route)
        if (loose_route()) {
            t_relay();
            exit;
        }
        sl_send_reply("404", "Not Found");
        exit;
    }

    # Обработка новых звонков (INVITE)
    if (is_method("INVITE")) {
        # Балансировка: группа 1, алгоритм 0 (хеш по Call-ID)
        # Если нода упадет, dispatcher автоматически выберет живую
        if (!ds_select_dst("1", "0")) {
            sl_send_reply("503", "No Destinations Available");
            exit;
        }
        
        xlog("L_INFO", "Routing INVITE with Call-ID $ci to $dd:$dp\n");
        
        # Добавляем Record-Route, чтобы последующие запросы (ACK, BYE) шли через балансер
        record_route();
        
        # Отправляем запрос на выбранный Asterisk stateful-методом
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
    }

    # Для остальных методов (например, CANCEL) просто релеим по правилам TM
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }
}

# Перехват локальных запросов (Health-checks от модуля dispatcher)
event_route[tm:local-request] {
    if (is_method("OPTIONS")) {
        # Добавляем произвольный SIP-заголовок для проверки Asterisk
        append_hf("X-Health-Check: Kamailio-Active\r\n");
    }
}
