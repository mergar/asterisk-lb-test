[general]
static=yes
writeprotect=no

[from-internal]
; Звонок на номер 100 — Тестовое приветствие Asterisk
exten => 100,1,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Hangup()

; Звонок на номер 200 — Эхо-тест (проверка задержки и кодеков)
exten => 200,1,Answer()
 same => n,Wait(1)
 same => n,Echo()
 same => n,Hangup()

; Правило для звонка на номер 101
exten => 101,1,NoOp(Звонок на номер 101)
 same => n,Dial(PJSIP/101,20)
 same => n,Hangup()

; Правило для звонка на номер 102
exten => 102,1,NoOp(Звонок на номер 102)
 same => n,Dial(PJSIP/102,20)
 same => n,Hangup()

; Звонок на номер 300 — Бесконечный тест звука
; ffmpeg -i  -ar 8000 -ac 1 /usr/local/share/asterisk/sounds/en/custom-long-test.wav
exten => 300,1,Answer()
 same => n(loop),Playback(custom-long-test) ; Расширение .wav писать НЕ нужно
 same => n,Goto(loop)
 same => n,Hangup()
