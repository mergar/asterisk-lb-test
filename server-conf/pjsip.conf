; ==========================================
; ТРАНСПОРТ (Сетевые настройки)
; ==========================================
[transport-udp]
type=transport
protocol=udp
bind=172.16.0.144:5060

; ==========================================
; ШАБЛОН ДЛЯ ПОЛЬЗОВАТЕЛЕЙ (Экономит место)
; ==========================================
[endpoint-template](!)
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
transport=transport-udp

; ==========================================
; ПОЛЬЗОВАТЕЛЬ: 101 (Для Linphone)
; ==========================================
[101](endpoint-template)
auth=auth101
aors=101

[auth101]
type=auth
auth_type=md5
username=101
; Пароль для регистрации в Linphone
password=SuperSecretPass101 

[101]
type=aor
max_contacts=1
remove_existing=yes ; Выбивать старую регистрацию при появлении новой

; ==========================================
; ПОЛЬЗОВАТЕЛЬ: 102 (Второй клиент)
; ==========================================
[102](endpoint-template)
auth=auth102
aors=102


[auth102]
type=auth
auth_type=md5
username=102
password=SuperSecretPass102 

[102]
type=aor
max_contacts=1
remove_existing=yes ; Выбивать старую регистрацию при появлении новой


; Идентификация входящего трафика по IP адресу балансировщика
[kamailio-trunk-identify]
type=identify
endpoint=kamailio-trunk
match=172.16.0.149

; Доверенный эндпоинт без авторизации
[kamailio-trunk]
type=endpoint
context=from-internal ; Или ваш контекст, где лежит dialplan для baresip (например, default)
allow=ulaw,alaw
auth=
